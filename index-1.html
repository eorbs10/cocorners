<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 하드코어 웨이브 게임 (독립 규칙 적용)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
            touch-action: none; 
        }
        canvas { 
            display: block; 
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        #scoreBoard {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            font-size: 24px; 
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #startMsg {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #00ff00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        #gameover-container {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px; 
            border-radius: 15px;
            text-align: center;
            color: white;
            display: none;
            pointer-events: auto; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #gameover-container h1 { margin-top: 0; color: #ff4444; }
        #deathReason { color: #aaa; margin-bottom: 20px; }
        button {
            padding: 12px 24px; 
            font-size: 18px; 
            font-weight: bold;
            background-color: #00ff00; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #00cc00; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div id="scoreBoard">점수: <span id="score">0</span></div>
        <div id="startMsg">체스판 위를 클릭한 채로 움직이세요!<br>(마우스를 떼면 게임 오버)</div>
    </div>
    
    <div id="gameover-container">
        <h1>게임 오버!</h1>
        <p id="deathReason">웨이브에 휩쓸렸습니다.</p>
        <button id="resetBtn">다시 시작하기</button>
    </div>

    <script>
        // 1. 기본 씬 설정
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 11, 6); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // 2. 7x12 체스판 구성
        const cols = 5;  
        const rows = 10; 
        const tiles = {}; 
        const tileGroup = new THREE.Group();
        scene.add(tileGroup);

        const tileGeom = new THREE.BoxGeometry(0.95, 0.2, 0.95);
        const edgeGeom = new THREE.EdgesGeometry(tileGeom);
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

        const offsetX = (cols - 1) / 2;
        const offsetZ = (rows - 1) / 2;

        for (let z = -1; z <= rows; z++) {
            for (let x = -1; x <= cols; x++) {
                const isInner = (x >= 0 && x < cols && z >= 0 && z < rows);
                
                const mat = new THREE.MeshStandardMaterial({ 
                    color: isInner ? 0xffffff : 0x1a1a1a 
                });
                const tile = new THREE.Mesh(tileGeom, mat);
                tile.position.set(x - offsetX, 0, z - offsetZ);
                
                if (isInner) {
                    const edges = new THREE.LineSegments(edgeGeom, edgeMat);
                    tile.add(edges);
                }

                tile.userData = { gridX: x, gridZ: z, isInner: isInner, isSafe: false, isDeadly: false };
                tileGroup.add(tile);
                tiles[`${x},${z}`] = tile;
            }
        }

        // 3. 게임 변수
        let isPlaying = false;
        let gameOver = false;
        let playerPos = { x: -99, z: -99 };
        let score = 0;
        let lastTime = 0;
        
        let waveSpeed = 300; 
        let spawnTimer = 0;
        let waves = []; 

        // 4. 입력 처리
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getIntersectedTile(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tileGroup.children);
            if (intersects.length > 0) return intersects[0].object;
            return null;
        }

        function updatePlayerPos(e) {
            const tile = getIntersectedTile(e);
            if (tile && tile.userData.isInner) {
                playerPos.x = tile.userData.gridX;
                playerPos.z = tile.userData.gridZ;
                checkAllCollisions(); 
            }
        }

        function triggerGameOver(reason) {
            if (!isPlaying || gameOver) return;
            isPlaying = false;
            gameOver = true;
            document.getElementById('deathReason').innerText = reason;
            document.getElementById('gameover-container').style.display = 'block';
            document.getElementById('startMsg').style.display = 'none';
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON' || gameOver) return;
            
            const tile = getIntersectedTile(e);
            if (tile && tile.userData.isInner && !isPlaying) {
                isPlaying = true;
                document.getElementById('startMsg').style.display = 'none';
                updatePlayerPos(e);
                lastTime = Date.now();
                spawnWaveIfNeeded();
            } else if (isPlaying) {
                updatePlayerPos(e);
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (isPlaying) updatePlayerPos(e);
        });

        window.addEventListener('pointerup', () => triggerGameOver("마우스를 떼서 게임 오버!"));
        window.addEventListener('pointerleave', () => triggerGameOver("화면을 벗어나 게임 오버!"));
        window.addEventListener('blur', () => triggerGameOver("다른 창으로 이동하여 게임 오버!"));

        document.getElementById('resetBtn').addEventListener('click', () => {
            playerPos = { x: -99, z: -99 };
            score = 0;
            waveSpeed = 300;
            waves = [];
            spawnTimer = 0;
            gameOver = false;
            isPlaying = false;
            
            document.getElementById('score').innerText = score;
            document.getElementById('gameover-container').style.display = 'none';
            document.getElementById('startMsg').style.display = 'block';
            updateColors();
        });

        // 5. 웨이브 및 충돌 로직
        function spawnWave(type) {
            let dir, axisVal, dx = 0, dz = 0, safeIndex;
            
            if (type === 'vertical') { 
                dir = Math.random() < 0.5 ? 'top' : 'bottom';
                if (dir === 'top') { axisVal = -1; dz = 1; } 
                else { axisVal = rows; dz = -1; }
                safeIndex = Math.floor(Math.random() * cols);
            } else { 
                dir = Math.random() < 0.5 ? 'left' : 'right';
                if (dir === 'left') { axisVal = -1; dx = 1; } 
                else { axisVal = cols; dx = -1; }
                safeIndex = Math.floor(Math.random() * rows);
            }

            waves.push({
                type: type, dir: dir, axisVal: axisVal, dx: dx, dz: dz,
                safeIndex: safeIndex, state: 'blink', timer: 0, blinkCount: 0, isVisible: true
            });
        }

        function spawnWaveIfNeeded() {
            let vCount = waves.filter(w => w.type === 'vertical').length;
            let hCount = waves.filter(w => w.type === 'horizontal').length;

            if (vCount < 2 && Math.random() < 0.7) spawnWave('vertical');
            if (hCount < 1 && Math.random() < 0.5) spawnWave('horizontal');
            if (vCount === 0 && hCount === 0) spawnWave('vertical');
        }

        function checkAllCollisions() {
            if (!isPlaying || gameOver) return;
            
            let isDeadlyHit = false;
            let isSafeHit = false; // 안전지대 밟음 여부

            for (let w of waves) {
                if (w.state !== 'move') continue;
                
                let isOnThisWave = false;
                let isSafeOnThisWave = false;

                if (w.type === 'vertical') {
                    if (playerPos.z === w.axisVal) {
                        isOnThisWave = true;
                        if (playerPos.x === w.safeIndex) isSafeOnThisWave = true;
                    }
                } else {
                    if (playerPos.x === w.axisVal) {
                        isOnThisWave = true;
                        if (playerPos.z === w.safeIndex) isSafeOnThisWave = true;
                    }
                }

                if (isOnThisWave) {
                    if (isSafeOnThisWave) {
                        isSafeHit = true; // 현재 서 있는 곳이 어떤 웨이브의 안전지대라면 생존 플래그 획득
                    } else {
                        isDeadlyHit = true; // 공격 타일 위
                    }
                }
            }

            // 💡 독립 규칙 적용: 치명타를 맞았더라도, 하나의 안전지대(초록색)라도 밟고 있다면 무적!
            if (isDeadlyHit && !isSafeHit) {
                triggerGameOver("웨이브에 휩쓸렸습니다!");
            }
        }

        // 6. 렌더링 루프
        function updateColors() {
            for (let z = -1; z <= rows; z++) {
                for (let x = -1; x <= cols; x++) {
                    const tile = tiles[`${x},${z}`];
                    tile.userData.isDeadly = false;
                    tile.userData.isSafe = false;
                    tile.material.color.setHex(tile.userData.isInner ? 0xffffff : 0x1a1a1a);
                }
            }

            for (let w of waves) {
                if (w.state === 'idle' || !w.isVisible) continue;
                
                if (w.type === 'vertical') {
                    for (let x = -1; x <= cols; x++) {
                        const t = tiles[`${x},${w.axisVal}`];
                        if (t) {
                            if (x === w.safeIndex) t.userData.isSafe = true;
                            else t.userData.isDeadly = true;
                        }
                    }
                } else {
                    for (let z = -1; z <= rows; z++) {
                        const t = tiles[`${w.axisVal},${z}`];
                        if (t) {
                            if (z === w.safeIndex) t.userData.isSafe = true;
                            else t.userData.isDeadly = true;
                        }
                    }
                }
            }

            for (let z = -1; z <= rows; z++) {
                for (let x = -1; x <= cols; x++) {
                    const t = tiles[`${x},${z}`];
                    // 💡 시각적 독립 규칙 적용: 안전지대(초록)가 교차점의 보라색을 뚫고 무조건 우선 표시됨
                    if (t.userData.isSafe) {
                        t.material.color.setHex(0x00ff00);
                    } else if (t.userData.isDeadly) {
                        t.material.color.setHex(0x800080);
                    }
                }
            }

            if (isPlaying && playerPos.x !== -99) {
                const pTile = tiles[`${playerPos.x},${playerPos.z}`];
                if (pTile) pTile.material.color.setHex(0x00aa00);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying && !gameOver) {
                const now = Date.now();
                const delta = now - lastTime;
                lastTime = now;

                spawnTimer += delta;
                if (spawnTimer > waveSpeed * 4) {
                    spawnTimer = 0;
                    spawnWaveIfNeeded();
                }

                for (let i = waves.length - 1; i >= 0; i--) {
                    let w = waves[i];
                    w.timer += delta;

                    if (w.state === 'blink') {
                        if (w.timer > 150) { 
                            w.isVisible = !w.isVisible;
                            w.blinkCount++;
                            w.timer = 0;

                            if (w.blinkCount >= 6) { 
                                w.state = 'move';
                                w.isVisible = true;
                                w.timer = 0;
                            }
                        }
                    } 
                    else if (w.state === 'move') {
                        if (w.timer > waveSpeed) {
                            w.timer = 0;
                            w.axisVal += (w.dir === 'top' || w.dir === 'bottom') ? w.dz : w.dx;

                            let isOut = false;
                            if (w.dir === 'top' && w.axisVal > rows) isOut = true;
                            if (w.dir === 'bottom' && w.axisVal < -1) isOut = true;
                            if (w.dir === 'left' && w.axisVal > cols) isOut = true;
                            if (w.dir === 'right' && w.axisVal < -1) isOut = true;

                            if (isOut) {
                                waves.splice(i, 1);
                                score += 10;
                                document.getElementById('score').innerText = score;
                                if (waveSpeed > 80) waveSpeed -= 4; 
                            }
                        }
                    }
                }
                
                checkAllCollisions();
                updateColors();
            } else if (gameOver) {
                updateColors();
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateColors();
        animate();
    </script>
</body>
</html>
