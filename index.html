<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 웨이브 게임 (카메라 시점 완벽 수정판)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
            touch-action: none; 
        }
        canvas { 
            display: block; 
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        #scoreBoard {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            font-size: 24px; 
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #startMsg {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #00ff00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        #gameover-container {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px; 
            border-radius: 15px;
            text-align: center;
            color: white;
            display: none;
            pointer-events: auto; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #gameover-container h1 { margin-top: 0; color: #ff4444; }
        #deathReason { color: #aaa; margin-bottom: 20px; }
        button {
            padding: 12px 24px; 
            font-size: 18px; 
            font-weight: bold;
            background-color: #00ff00; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #00cc00; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div id="scoreBoard">점수: <span id="score">0</span></div>
        <div id="startMsg">하얀색 체스판 위를 클릭한 채로 움직이세요!<br>(마우스를 떼면 게임 오버)</div>
    </div>
    
    <div id="gameover-container">
        <h1>게임 오버!</h1>
        <p id="deathReason">웨이브에 휩쓸렸습니다.</p>
        <button id="resetBtn">다시 시작하기</button>
    </div>

    <script>
        // 1. 기본 씬 설정
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 💡 핵심 수정: 카메라를 훨씬 높이(Y=15) 당겨서 맨 위/아래 가장자리 끝까지 다 보이게 만듦
        camera.position.set(0, 15, 8); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // 2. 5x10 체스판 + 경기장 밖 생성구역(대기존) 구성
        const cols = 5;  
        const rows = 10; 
        const tiles = {}; 
        const tileGroup = new THREE.Group();
        scene.add(tileGroup);

        const tileGeom = new THREE.BoxGeometry(0.95, 0.2, 0.95);
        const edgeGeom = new THREE.EdgesGeometry(tileGeom);

        const offsetX = (cols - 1) / 2;
        const offsetZ = (rows - 1) / 2;

        for (let z = -1; z <= rows; z++) {
            for (let x = -1; x <= cols; x++) {
                const isInner = (x >= 0 && x < cols && z >= 0 && z < rows);
                
                // 💡 핵심 수정: 경기장 밖(생성 지점)을 눈에 보이도록 어두운 회색(0x333333)으로 칠함
                const mat = new THREE.MeshStandardMaterial({ 
                    color: isInner ? 0xffffff : 0x333333 
                });
                const tile = new THREE.Mesh(tileGeom, mat);
                tile.position.set(x - offsetX, 0, z - offsetZ);
                
                // 대기존 타일에도 희미하게 검정 라인을 그려서 구역을 명확히 함
                const edgeColor = isInner ? 0x000000 : 0x111111;
                const edges = new THREE.LineSegments(edgeGeom, new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 2 }));
                tile.add(edges);

                tile.userData = { gridX: x, gridZ: z, isInner: isInner };
                tileGroup.add(tile);
                tiles[`${x},${z}`] = tile;
            }
        }

        // 3. 게임 변수
        let isPlaying = false;
        let gameOver = false;
        let playerPos = { x: -99, z: -99 };
        let score = 0;
        let lastTime = 0;
        
        let waveSpeed = 300; 
        let spawnTimer = 0;
        let waves = []; 

        // 4. 입력 처리
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getIntersectedTile(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tileGroup.children);
            if (intersects.length > 0) return intersects[0].object;
            return null;
        }

        function updatePlayerPos(e) {
            const tile = getIntersectedTile(e);
            if (tile && tile.userData.isInner) {
                playerPos.x = tile.userData.gridX;
                playerPos.z = tile.userData.gridZ;
            }
        }

        function triggerGameOver(reason) {
            if (!isPlaying || gameOver) return;
            isPlaying = false;
            gameOver = true;
            document.getElementById('deathReason').innerText = reason;
            document.getElementById('gameover-container').style.display = 'block';
            document.getElementById('startMsg').style.display = 'none';
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON' || gameOver) return;
            const tile = getIntersectedTile(e);
            if (tile && tile.userData.isInner && !isPlaying) {
                isPlaying = true;
                document.getElementById('startMsg').style.display = 'none';
                updatePlayerPos(e);
                lastTime = Date.now();
                spawnWaveIfNeeded();
            } else if (isPlaying) {
                updatePlayerPos(e);
            }
        });

        window.addEventListener('pointermove', (e) => { if (isPlaying) updatePlayerPos(e); });
        window.addEventListener('pointerup', () => triggerGameOver("마우스를 떼서 게임 오버!"));
        window.addEventListener('pointerleave', () => triggerGameOver("화면을 벗어나 게임 오버!"));

        document.getElementById('resetBtn').addEventListener('click', () => {
            playerPos = { x: -99, z: -99 };
            score = 0;
            waveSpeed = 300;
            waves = [];
            spawnTimer = 0;
            gameOver = false;
            isPlaying = false;
            document.getElementById('score').innerText = score;
            document.getElementById('gameover-container').style.display = 'none';
            document.getElementById('startMsg').style.display = 'block';
        });

        // 5. 웨이브 생성 로직 (반드시 대기존에서 시작)
        function spawnWave(type) {
            let dir, axisVal, dx = 0, dz = 0, safeIndex;
            
            if (type === 'vertical') { // 상 하로 쓸고 가는 웨이브
                dir = Math.random() < 0.5 ? 'top' : 'bottom';
                // 무조건 -1(맨 위 대기존) 또는 rows(맨 아래 대기존)에서 생성
                axisVal = (dir === 'top') ? -1 : rows; 
                dz = (dir === 'top') ? 1 : -1;
                safeIndex = Math.floor(Math.random() * cols);
            } else { // 좌 우로 쓸고 가는 웨이브
                dir = Math.random() < 0.5 ? 'left' : 'right';
                // 무조건 -1(맨 좌측 대기존) 또는 cols(맨 우측 대기존)에서 생성
                axisVal = (dir === 'left') ? -1 : cols;
                dx = (dir === 'left') ? 1 : -1;
                safeIndex = Math.floor(Math.random() * rows);
            }

            waves.push({
                type: type, dir: dir, axisVal: axisVal, dx: dx, dz: dz,
                safeIndex: safeIndex, state: 'blink', timer: 0, blinkCount: 0, isVisible: true
            });
        }

        function spawnWaveIfNeeded() {
            let vCount = waves.filter(w => w.type === 'vertical').length;
            let hCount = waves.filter(w => w.type === 'horizontal').length;
            if (vCount < 2 && Math.random() < 0.7) spawnWave('vertical');
            if (hCount < 1 && Math.random() < 0.5) spawnWave('horizontal');
            if (vCount === 0 && hCount === 0) spawnWave('vertical');
        }

        // 6. 그리드 상태 계산
        function updateGridState() {
            for (let z = -1; z <= rows; z++) {
                for (let x = -1; x <= cols; x++) {
                    const t = tiles[`${x},${z}`];
                    t.userData.isDeadly = false;
                    t.userData.isSafe = false;
                    t.userData.isIntersectionSafe = false;
                }
            }

            let vWaves = []; 
            let hWaves = []; 

            for (let w of waves) {
                if (w.state === 'idle' || !w.isVisible) continue;
                
                if (w.type === 'vertical') {
                    vWaves.push(w);
                    for (let x = -1; x <= cols; x++) {
                        let t = tiles[`${x},${w.axisVal}`];
                        if (t) {
                            t.userData.isDeadly = true;
                            if (x === w.safeIndex) t.userData.isSafe = true;
                        }
                    }
                } else {
                    hWaves.push(w);
                    for (let z = -1; z <= rows; z++) {
                        let t = tiles[`${w.axisVal},${z}`];
                        if (t) {
                            t.userData.isDeadly = true;
                            if (z === w.safeIndex) t.userData.isSafe = true;
                        }
                    }
                }
            }

            for (let vw of vWaves) {
                for (let hw of hWaves) {
                    let ix = hw.axisVal;
                    let iz = vw.axisVal;
                    let offsets = [[0,0], [-1,0], [1,0], [0,-1], [0,1]];
                    for (let off of offsets) {
                        let t = tiles[`${ix + off[0]},${iz + off[1]}`];
                        if (t) t.userData.isIntersectionSafe = true;
                    }
                }
            }
        }

        function checkCollision() {
            if (!isPlaying || gameOver) return;
            const pTile = tiles[`${playerPos.x},${playerPos.z}`];
            if (pTile) {
                if (pTile.userData.isDeadly && !pTile.userData.isSafe && !pTile.userData.isIntersectionSafe) {
                    triggerGameOver("웨이브에 휩쓸렸습니다!");
                }
            }
        }

        function updateColors() {
            for (let z = -1; z <= rows; z++) {
                for (let x = -1; x <= cols; x++) {
                    const t = tiles[`${x},${z}`];
                    
                    if (t.userData.isIntersectionSafe && t.userData.isDeadly) {
                        t.material.color.setHex(0x00ff00);
                    } else if (t.userData.isSafe) {
                        t.material.color.setHex(0x00ff00);
                    } else if (t.userData.isDeadly) {
                        t.material.color.setHex(0x800080);
                    } else {
                        // 대기존은 어두운 회색, 경기장은 흰색
                        t.material.color.setHex(t.userData.isInner ? 0xffffff : 0x333333);
                    }
                }
            }
            if (isPlaying && playerPos.x !== -99) {
                const pTile = tiles[`${playerPos.x},${playerPos.z}`];
                if (pTile) pTile.material.color.setHex(0x00aa00);
            }
        }

        // 7. 메인 루프
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying && !gameOver) {
                const now = Date.now();
                const delta = now - lastTime;
                lastTime = now;

                spawnTimer += delta;
                if (spawnTimer > waveSpeed * 4) {
                    spawnTimer = 0;
                    spawnWaveIfNeeded();
                }

                for (let i = waves.length - 1; i >= 0; i--) {
                    let w = waves[i];
                    w.timer += delta;

                    if (w.state === 'blink') {
                        if (w.timer > 150) { 
                            w.isVisible = !w.isVisible;
                            w.blinkCount++;
                            w.timer = 0;
                            if (w.blinkCount >= 6) { 
                                w.state = 'move';
                                w.isVisible = true;
                                w.timer = 0;
                            }
                        }
                    } 
                    else if (w.state === 'move') {
                        if (w.timer > waveSpeed) {
                            w.timer = 0;
                            w.axisVal += (w.type === 'vertical') ? w.dz : w.dx;

                            let isOut = false;
                            if (w.dir === 'top' && w.axisVal > rows) isOut = true;
                            if (w.dir === 'bottom' && w.axisVal < -1) isOut = true;
                            if (w.dir === 'left' && w.axisVal > cols) isOut = true;
                            if (w.dir === 'right' && w.axisVal < -1) isOut = true;

                            if (isOut) {
                                waves.splice(i, 1);
                                score += 10;
                                document.getElementById('score').innerText = score;
                                if (waveSpeed > 80) waveSpeed -= 4; 
                            }
                        }
                    }
                }
                
                updateGridState();
                checkCollision();
                updateColors();
            } else if (gameOver) {
                updateColors(); 
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateGridState();
        updateColors();
        animate();
    </script>
</body>
</html>
